# Worked example: platform Lambda topology (subset) as an architecture demo
# Pattern: architecture
# Render with: npx remotion render EventLambdaTopology out/event-arch.mp4

title: "Acme Platform — Event-Driven Lambda Topology"
subtitle: "Ingress → core handlers → integrations → data plane"
duration_seconds: 75
fps: 30

# 1920×1080 canvas. Group services into 4 vertical bands.
# Showing a 14-service subset of the full 43-Lambda topology — enough to convey the shape without overwhelming.

services:
  # === Ingress (left, x=120) ===
  - id: api_gateway_member
    label: "API Gateway (member)"
    role: ingress
    position: { x: 120, y: 280 }
  - id: api_gateway_coach
    label: "API Gateway (coach)"
    role: ingress
    position: { x: 120, y: 540 }
  - id: api_gateway_sf
    label: "API Gateway (Salesforce)"
    role: ingress
    position: { x: 120, y: 800 }

  # === Core handlers (center-left, x=560) ===
  - id: lifecycle_handler
    label: "lifecycle-stage-handler"
    role: lambda
    position: { x: 560, y: 200 }
  - id: carrier_events
    label: "carrier-events"
    role: lambda
    position: { x: 560, y: 380 }
  - id: case_creator
    label: "case-creator"
    role: lambda
    position: { x: 560, y: 560 }
  - id: sparks_engine
    label: "sparks-engine"
    role: lambda
    position: { x: 560, y: 740 }

  # === Queues + topics (center, x=1000) ===
  - id: lifecycle_topic
    label: "SNS lifecycle"
    role: queue
    position: { x: 1000, y: 280 }
  - id: sf_sync_queue
    label: "SQS sf-sync (FIFO)"
    role: queue
    position: { x: 1000, y: 540 }
  - id: events_kinesis
    label: "Kinesis events"
    role: queue
    position: { x: 1000, y: 800 }

  # === Integrations + data plane (right, x=1500) ===
  - id: cognito
    label: "Cognito (3 pools)"
    role: external
    position: { x: 1500, y: 200 }
  - id: salesforce
    label: "Salesforce CRM"
    role: external
    position: { x: 1500, y: 400 }
  - id: rds
    label: "RDS PostgreSQL"
    role: db
    position: { x: 1500, y: 600 }
  - id: cloudwatch
    label: "CloudWatch + OTEL"
    role: external
    position: { x: 1500, y: 800 }

connections:
  # Ingress → core
  - { from: api_gateway_member, to: lifecycle_handler, type: sync, label: "POST /lifecycle" }
  - { from: api_gateway_member, to: case_creator, type: sync, label: "POST /case" }
  - { from: api_gateway_coach, to: case_creator, type: sync }
  - { from: api_gateway_sf, to: carrier_events, type: sync, label: "carrier webhook" }

  # Core → queues
  - { from: lifecycle_handler, to: lifecycle_topic, type: event, label: "lifecycle changed" }
  - { from: carrier_events, to: lifecycle_topic, type: event }
  - { from: carrier_events, to: sf_sync_queue, type: async, label: "needs SF sync" }
  - { from: lifecycle_handler, to: sparks_engine, type: async }

  # Queues fan out
  - { from: lifecycle_topic, to: cognito, type: event, label: "disable on cancelled" }
  - { from: sf_sync_queue, to: salesforce, type: async }

  # All core handlers persist to RDS
  - { from: lifecycle_handler, to: rds, type: sync }
  - { from: case_creator, to: rds, type: sync }
  - { from: carrier_events, to: rds, type: sync }
  - { from: sparks_engine, to: rds, type: sync, label: "audit: append-only" }

  # Observability fan-in
  - { from: lifecycle_handler, to: cloudwatch, type: async, label: "logs + metrics" }
  - { from: case_creator, to: cloudwatch, type: async }
  - { from: carrier_events, to: cloudwatch, type: async }
  - { from: events_kinesis, to: cloudwatch, type: async }

reveal_order:
  # Stage 0: gateways (0s-6s)
  - [api_gateway_member, api_gateway_coach, api_gateway_sf]
  # Stage 1: core handlers (6s-15s)
  - [lifecycle_handler, carrier_events, case_creator, sparks_engine]
  # Stage 2: queues (15s-24s)
  - [lifecycle_topic, sf_sync_queue, events_kinesis]
  # Stage 3: integrations + DB (24s-36s)
  - [cognito, salesforce, rds, cloudwatch]
  # Stage 4: connections animate in groups (36s-75s)

narration:
  - { segment: "The platform exposes three API gateways — one each for members, coaches, and Salesforce.", start_seconds: 0 }
  - { segment: "Behind them sit the core Lambda handlers: lifecycle, carrier events, case creator, and the Sparks engine.", start_seconds: 7 }
  - { segment: "Handlers don't call each other directly. They publish to SNS topics and SQS FIFO queues.", start_seconds: 16 }
  - { segment: "Cognito holds three separate user pools — one per audience. Salesforce is the system of record for case data. RDS holds member data including the append-only audit trail.", start_seconds: 25 }
  - { segment: "Now watch the data flow: a member request enters via API Gateway, the lifecycle handler updates state, an event publishes to SNS, downstream subscribers fan out to Cognito, Salesforce, and the audit log.", start_seconds: 36 }
