# Worked example: member lifecycle FSM as a state-machine explainer video
# Pattern: state-machine
# Render with: npx remotion render MemberLifecycleFsm out/member-lifecycle.mp4

title: "Member Lifecycle"
subtitle: "onboarding → early_engagement → engagement → cancelled"
duration_seconds: 60
fps: 30

states:
  - id: onboarding
    label: "onboarding"
    description: "First 30 days; Sparks not yet active; coach assignment in progress"
    position: { x: 200, y: 540 }

  - id: early_engagement
    label: "early_engagement"
    description: "Sparks active; coach assigned; first cycle in progress"
    position: { x: 700, y: 540 }

  - id: engagement
    label: "engagement"
    description: "Steady-state member; cycles continuing; full feature access"
    position: { x: 1200, y: 540 }

  - id: cancelled
    label: "cancelled"
    description: "Terminal — Cognito user disabled; PHI access revoked"
    position: { x: 1700, y: 540 }

transitions:
  # Valid transitions
  - id: t_onb_to_ee
    from: onboarding
    to: early_engagement
    trigger: "30 days elapsed AND coach assigned"
    valid: true

  - id: t_ee_to_eng
    from: early_engagement
    to: engagement
    trigger: "first cycle complete"
    valid: true

  - id: t_onb_to_cancel
    from: onboarding
    to: cancelled
    trigger: "carrier event: cancelled (during onboarding)"
    valid: true

  - id: t_ee_to_cancel
    from: early_engagement
    to: cancelled
    trigger: "carrier event: cancelled"
    valid: true

  - id: t_eng_to_cancel
    from: engagement
    to: cancelled
    trigger: "carrier event: cancelled"
    valid: true

  # Invalid transitions — used by the "attempted revival" scenario
  - id: t_invalid_revival
    from: cancelled
    to: engagement
    trigger: "(any attempt to un-cancel)"
    valid: false

  - id: t_invalid_skip
    from: onboarding
    to: engagement
    trigger: "(forward-skip past early_engagement)"
    valid: false

  - id: t_invalid_reverse
    from: engagement
    to: early_engagement
    trigger: "(reverse transition)"
    valid: false

scenarios:
  - id: happy_path
    name: "Happy path: onboarding through engagement"
    sequence: [onboarding, early_engagement, engagement]

  - id: early_cancel
    name: "Early cancellation: lost during onboarding"
    sequence: [onboarding, cancelled]

  - id: standard_cancel
    name: "Standard cancellation: from steady state"
    sequence: [engagement, cancelled]

  - id: invalid_revival
    name: "Attempted revival of cancelled member (BLOCKED by I.III.2)"
    sequence: [cancelled, engagement]      # final transition is invalid → triggers shake

  - id: invalid_skip
    name: "Forward-skip attempt: onboarding → engagement (BLOCKED)"
    sequence: [onboarding, engagement]     # invalid → triggers shake
